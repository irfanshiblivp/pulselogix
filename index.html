<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PulseLogix – Freelance Web Design</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet" />

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Framer Motion -->
  <script src="https://unpkg.com/framer-motion/dist/framer-motion.umd.js"></script>

  <!-- React + ReactDOM + Babel -->
  <script src="https://unpkg.com/react@17/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@17/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      scroll-behavior: smooth;
      background-color: #0f172a;
      color: white;
    }
    .gradient-bg {
      background: linear-gradient(135deg, #1e3a8a, #9333ea);
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { motion } = window['framer-motion'];

    const Hero = () => (
      <section className="h-screen flex items-center justify-center text-center gradient-bg">
        <motion.div initial={{ opacity: 0, y: -50 }} animate={{ opacity: 1, y: 0 }} transition={{ duration: 1 }}>
          <h1 className="text-5xl md:text-7xl font-bold mb-6">PulseLogix</h1>
          <p className="text-xl md:text-2xl mb-8">Designing Tomorrow’s Web, Today.</p>
          <a href="#contact" className="bg-white text-black font-semibold px-6 py-3 rounded hover:bg-gray-200 transition">
            Let’s Build Your Site
          </a>
        </motion.div>
      </section>
    );

    const About = () => (
      <section className="py-20 px-6 md:px-20 bg-gray-900">
        <h2 className="text-4xl font-bold mb-6 text-center">About PulseLogix</h2>
        <p className="max-w-3xl mx-auto text-lg text-gray-300">
          PulseLogix is a futuristic freelance web design brand with a passion for stunning digital experiences.
          With years of experience in modern web design, we focus on UX, branding, and custom interfaces.
          Using React, Next.js, Tailwind, GSAP, and Framer Motion, we craft websites for startups, personal brands, and modern businesses.
        </p>
      </section>
    );

    const services = [
      "Custom Web Design", "UI/UX Wireframing", "Responsive Layouts",
      "Admin Dashboards", "E-commerce & CMS", "Full React Apps",
      "Performance Optimization", "SEO Design", "Airtable Integration", "Firebase & APIs"
    ];

    const Services = () => (
      <section className="py-20 px-6 md:px-20 bg-gray-950">
        <h2 className="text-4xl font-bold mb-12 text-center">Services</h2>
        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
          {services.map((service, idx) => (
            <motion.div
              key={idx}
              whileHover={{ scale: 1.05 }}
              className="p-6 bg-gray-800 rounded-xl shadow hover:shadow-lg transition"
            >
              <div className="flex items-center gap-4 mb-3">
                <i data-lucide="check-circle" className="text-purple-400"></i>
                <h3 className="text-xl font-semibold">{service}</h3>
              </div>
              <p className="text-sm text-gray-400">We craft modern and functional solutions tailored to your brand’s vision.</p>
            </motion.div>
          ))}
        </div>
      </section>
    );

    const Portfolio = () => (
      <section className="py-20 px-6 md:px-20 bg-gray-900">
        <h2 className="text-4xl font-bold mb-12 text-center">Portfolio</h2>
        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
          {[1,2,3].map(num => (
            <div key={num} className="bg-gray-800 rounded-xl overflow-hidden shadow">
              <img src={`https://placehold.co/600x400?text=Project+${num}`} alt={`Project ${num}`} />
              <div className="p-4">
                <h3 className="text-xl font-semibold">Project {num}</h3>
                <p className="text-sm text-gray-400 mb-2">React, Tailwind, Firebase</p>
                <div className="flex gap-3">
                  <a href="#" className="text-purple-400 hover:underline">View Demo</a>
                  <a href="#" className="text-purple-400 hover:underline">GitHub</a>
                </div>
              </div>
            </div>
          ))}
        </div>
      </section>
    );

    const Pricing = () => (
      <section className="py-20 px-6 md:px-20 bg-gray-950">
        <h2 className="text-4xl font-bold mb-12 text-center">Pricing</h2>
        <div className="grid md:grid-cols-3 gap-6">
          {[
            { title: "Basic", price: "$99", desc: "One Page Portfolio" },
            { title: "Pro", price: "$299", desc: "Multi-page Site + CMS" },
            { title: "Premium", price: "$599", desc: "Full React Web App" }
          ].map((plan, idx) => (
            <div key={idx} className="bg-gray-800 rounded-xl p-6 text-center shadow">
              <h3 className="text-2xl font-bold">{plan.title}</h3>
              <p className="text-4xl my-4 text-purple-400">{plan.price}</p>
              <p className="text-gray-300 mb-4">{plan.desc}</p>
              <button className="bg-purple-600 px-4 py-2 rounded text-white hover:bg-purple-700 transition">Request Project</button>
            </div>
          ))}
        </div>
      </section>
    );

    const ChooseUs = () => (
      <section className="py-20 px-6 md:px-20 bg-gray-900 text-center">
        <h2 className="text-4xl font-bold mb-12">Why Choose PulseLogix?</h2>
        <div className="grid md:grid-cols-4 gap-6">
          {[
            ["100+", "Projects Delivered"],
            ["5-Star", "Client Feedback"],
            ["100%", "Responsive Designs"],
            ["Support", "Ongoing Help"]
          ].map(([num, label], idx) => (
            <motion.div
              key={idx}
              whileInView={{ opacity: 1, y: 0 }}
              initial={{ opacity: 0, y: 50 }}
              transition={{ delay: idx * 0.2 }}
              className="p-4 bg-gray-800 rounded-xl"
            >
              <h3 className="text-3xl font-bold text-purple-400">{num}</h3>
              <p className="text-gray-300">{label}</p>
            </motion.div>
          ))}
        </div>
      </section>
    );

    const Testimonials = () => (
      <section className="py-20 px-6 md:px-20 bg-gray-950">
        <h2 className="text-4xl font-bold mb-12 text-center">Client Testimonials</h2>
        <div className="grid md:grid-cols-3 gap-6">
          {["Startup Site", "Portfolio", "Dashboard"].map((type, idx) => (
            <div key={idx} className="bg-gray-800 rounded-xl p-6 shadow">
              <p className="italic text-gray-300">"PulseLogix exceeded my expectations with a sleek, fast, and engaging {type}!"</p>
              <p className="mt-4 font-semibold text-purple-400">— Client {idx + 1}</p>
            </div>
          ))}
        </div>
      </section>
    );

    const Contact = () => (
      <section id="contact" className="py-20 px-6 md:px-20 bg-gray-900">
        <h2 className="text-4xl font-bold mb-6 text-center">Contact</h2>
        <form className="max-w-xl mx-auto grid gap-4">
          <input type="text" placeholder="Name" className="p-3 rounded bg-gray-800 text-white" required />
          <input type="email" placeholder="Email" className="p-3 rounded bg-gray-800 text-white" required />
          <textarea placeholder="Message" rows="5" className="p-3 rounded bg-gray-800 text-white" required></textarea>
          <button className="bg-purple-600 hover:bg-purple-700 px-6 py-3 rounded text-white transition">Send Message</button>
        </form>
        <div className="mt-8 text-center text-gray-400">
          Or reach out via:
          <div className="flex justify-center gap-4 mt-2">
            <a href="#" className="hover:text-white">LinkedIn</a>
            <a href="#" className="hover:text-white">GitHub</a>
            <a href="#" className="hover:text-white">Instagram</a>
          </div>
        </div>
      </section>
    );

    const Footer = () => (
      <footer className="py-6 text-center bg-gray-950 text-gray-400">
        <p>PulseLogix © {new Date().getFullYear()} – Made with love</p>
      </footer>
    );

    const App = () => (
      <>
        <Hero />
        <About />
        <Services />
        <Portfolio />
        <Pricing />
        <ChooseUs />
        <Testimonials />
        <Contact />
        <Footer />
      </>
    );

    ReactDOM.render(<App />, document.getElementById("root"));

    // Activate Lucide icons
    lucide.createIcons();
  </script>
</body>
</html>
