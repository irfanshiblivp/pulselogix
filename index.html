<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PulseLogix - NextGen Web Design</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #1E2A38, #3A6EA5);
            color: white;
            text-align: center;
        }
        header {
            padding: 20px;
            font-size: 24px;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }
        #app {
            margin: 50px auto;
        }
        .btn {
            padding: 12px 20px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            background: #E91E63;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn:hover {
            background: #C2185B;
        }
    </style>
</head>
<body>

    <header>
        <i class="fa fa-globe"></i> PulseLogix - Web Design Reimagined
    </header>

    <div id="app"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/6.26.0/babel.min.js"></script>
    
    <script type="text/babel">
        function App() {
            return (
                <div>
                    <h1>Welcome to PulseLogix</h1>
                    <p>Crafting digital experiences with next-generation design.</p>
                    <button className="btn">Start Your Journey</button>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('app'));
    </script>

</body>
</html>
