<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PulseLogix - Smart Solutions</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #f5f5f5;
    }
    header, footer {
      background-color: #2c3e50;
      color: white;
      padding: 1em;
      text-align: center;
    }
    nav a {
      color: white;
      margin: 0 1em;
      text-decoration: none;
      font-weight: bold;
    }
    nav a.active {
      border-bottom: 2px solid #e74c3c;
    }
    main {
      padding: 2em;
    }
    section img {
      max-width: 100%;
      border-radius: 8px;
      margin-top: 1em;
    }
    .plans {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .plan {
      background: white;
      padding: 1em;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      width: 300px;
    }
    .plan h3 {
      color: #e74c3c;
    }
    .plan ul {
      padding-left: 20px;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <!-- React Router -->
  <script src="https://unpkg.com/react-router-dom@6/umd/react-router-dom.development.js" crossorigin></script>

  <script type="text/babel">
    const { BrowserRouter, Routes, Route, Link, useLocation } = ReactRouterDOM;

    const Header = () => {
      const location = useLocation();
      return (
        <header>
          <h1>PulseLogix</h1>
          <nav>
            <Link to="/" className={location.pathname === '/' ? 'active' : ''}>Home</Link>
            <Link to="/about" className={location.pathname === '/about' ? 'active' : ''}>About Us</Link>
            <Link to="/services" className={location.pathname === '/services' ? 'active' : ''}>Services</Link>
            <Link to="/pricing" className={location.pathname === '/pricing' ? 'active' : ''}>Pricing</Link>
            <Link to="/contact" className={location.pathname === '/contact' ? 'active' : ''}>Contact</Link>
          </nav>
        </header>
      );
    };

    const Footer = () => (
      <footer>
        <p>&copy; {new Date().getFullYear()} PulseLogix. All rights reserved.</p>
      </footer>
    );

    const Home = () => (
      <section>
        <h2>Welcome to PulseLogix</h2>
        <p>Your partner in smart solutions for a connected world.</p>
        <img src="https://source.unsplash.com/800x400/?technology,innovation" alt="Technology" />
      </section>
    );

    const AboutUs = () => (
      <section>
        <h2>About Us</h2>
        <p>PulseLogix delivers cutting-edge automation, AI, and IoT solutions to empower businesses and homes alike. Our team is dedicated to making tomorrow's technology accessible today.</p>
        <img src="https://source.unsplash.com/800x400/?teamwork,office" alt="Teamwork" />
      </section>
    );

    const Services = () => (
      <section>
        <h2>Our Services</h2>
        <ul>
          <li><i className="fas fa-cogs"></i> Industrial Automation</li>
          <li><i className="fas fa-network-wired"></i> IoT Systems</li>
          <li><i className="fas fa-brain"></i> AI Integration</li>
          <li><i className="fas fa-cloud"></i> Cloud Deployment</li>
        </ul>
        <img src="https://source.unsplash.com/800x400/?services,technology" alt="Services" />
      </section>
    );

    const Pricing = () => (
      <section>
        <h2>Pricing Plans</h2>
        <div className="plans">
          <div className="plan">
            <h3>Basic</h3>
            <p>$99/month</p>
            <ul>
              <li>Automation Setup</li>
              <li>Email Support</li>
            </ul>
          </div>
          <div className="plan">
            <h3>Standard</h3>
            <p>$199/month</p>
            <ul>
              <li>Advanced Analytics</li>
              <li>Priority Support</li>
              <li>Cloud Integration</li>
            </ul>
          </div>
          <div className="plan">
            <h3>Premium</h3>
            <p>$299/month</p>
            <ul>
              <li>Dedicated Manager</li>
              <li>Full Customization</li>
              <li>AI Modules</li>
            </ul>
          </div>
        </div>
      </section>
    );

    const Contact = () => (
      <section>
        <h2>Contact Us</h2>
        <p><i className="fas fa-envelope"></i> Email: support@pulselogix.com</p>
        <p><i className="fas fa-phone"></i> Phone: +1 800 123 4567</p>
        <img src="https://source.unsplash.com/800x400/?contact,help" alt="Contact" />
      </section>
    );

    const App = () => (
      <BrowserRouter>
        <Header />
        <main>
          <Routes>
            <Route path="/" element={<Home />} />
            <Route path="/about" element={<AboutUs />} />
            <Route path="/services" element={<Services />} />
            <Route path="/pricing" element={<Pricing />} />
            <Route path="/contact" element={<Contact />} />
          </Routes>
        </main>
        <Footer />
      </BrowserRouter>
    );

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
